name: security pipeline

on:
 push:
   branches:
     -master


jobs:

  security-scan:
     runs-on: ubuntu-latest

    steps:

     - name:checkout code
       uses: actions/checkout@v4

    - name:build docker image
      run: docker build -t secure-app .

    - name:run trivy scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: secure-app
        format: table 
